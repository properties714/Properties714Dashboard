<!--
  table.html — Main Data Table (Partial)
  Properties714 · Acquisitions Module

  This file documents the full column schema and markup structure
  rendered by Table.render(). Reference for customization or
  server-side rendering targets.

  Container target: <div id="table-container"></div>
-->

<div class="table-shell">

  <!-- ── Toolbar (column toggles + bulk actions) ── -->
  <div class="table-toolbar" id="table-toolbar">

    <div class="toolbar-left">
      <!-- Bulk select info (shown when rows are selected) -->
      <div class="bulk-bar" id="bulk-bar" hidden>
        <span class="bulk-count"><span id="bulk-count-num">0</span> selected</span>
        <button class="btn btn-ghost btn-xs" data-bulk-action="status">Change Status</button>
        <button class="btn btn-ghost btn-xs" data-bulk-action="assign">Assign</button>
        <button class="btn btn-ghost btn-xs" data-bulk-action="export">Export</button>
        <button class="btn-link" id="clear-selection-btn">Deselect</button>
      </div>
    </div>

    <div class="toolbar-right">
      <!-- Column visibility toggle -->
      <div class="col-toggle-wrapper">
        <button class="btn btn-ghost btn-xs" id="col-toggle-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Columns
        </button>
        <div class="col-toggle-panel" id="col-toggle-panel" hidden>
          <!-- Column checkboxes rendered by Table._renderColToggles() -->
        </div>
      </div>
    </div>

  </div><!-- /.table-toolbar -->

  <!-- ── Main Table ── -->
  <div class="table-scroll-wrapper">
    <table class="leads-table" id="leads-table" role="grid">

      <!-- Column groups (widths) -->
      <colgroup>
        <col class="col-check" style="width:40px" />
        <!-- Remaining cols generated by Table._renderColGroups() -->
      </colgroup>

      <!-- Header -->
      <thead class="table-head">
        <tr>
          <!-- Checkbox: select all -->
          <th class="col-check" scope="col">
            <input type="checkbox" id="select-all-checkbox" aria-label="Select all" />
          </th>

          <!-- ── Lead Info ── -->
          <th scope="col" data-col="name"         class="sortable">Name            <span class="sort-icon"></span></th>
          <th scope="col" data-col="phone"                        >Phone                                          </th>
          <th scope="col" data-col="source"       class="sortable">Source          <span class="sort-icon"></span></th>
          <th scope="col" data-col="assigned_to"  class="sortable">Assigned        <span class="sort-icon"></span></th>

          <!-- ── Property ── -->
          <th scope="col" data-col="property_address"             >Address                                        </th>
          <th scope="col" data-col="property_type"class="sortable">Type            <span class="sort-icon"></span></th>
          <th scope="col" data-col="condition"    class="sortable">Condition       <span class="sort-icon"></span></th>
          <th scope="col" data-col="occupancy"                    >Occupancy                                      </th>

          <!-- ── Financials ── -->
          <th scope="col" data-col="asking_price" class="sortable th-mono">Asking   <span class="sort-icon"></span></th>
          <th scope="col" data-col="arv"          class="sortable th-mono">ARV      <span class="sort-icon"></span></th>
          <th scope="col" data-col="repairs"      class="sortable th-mono">Repairs  <span class="sort-icon"></span></th>
          <th scope="col" data-col="mao"          class="sortable th-mono">MAO      <span class="sort-icon"></span></th>
          <th scope="col" data-col="roi"          class="sortable th-mono">ROI      <span class="sort-icon"></span></th>
          <th scope="col" data-col="estimated_profit" class="sortable th-mono">Profit <span class="sort-icon"></span></th>

          <!-- ── Intelligence ── -->
          <th scope="col" data-col="deal_score"   class="sortable">Score    <span class="sort-icon"></span></th>
          <th scope="col" data-col="motivation_score" class="sortable">Motiv. <span class="sort-icon"></span></th>
          <th scope="col" data-col="urgency_level"class="sortable">Urgency  <span class="sort-icon"></span></th>
          <th scope="col" data-col="risk_level"                   >Risk                                    </th>

          <!-- ── Pipeline ── -->
          <th scope="col" data-col="status"       class="sortable">Status   <span class="sort-icon"></span></th>
          <th scope="col" data-col="substatus"                    >Substatus                                </th>

          <!-- ── Activity ── -->
          <th scope="col" data-col="last_contact" class="sortable">Last Contact <span class="sort-icon"></span></th>
          <th scope="col" data-col="next_followup"class="sortable">Next F/U     <span class="sort-icon"></span></th>
          <th scope="col" data-col="attempts"     class="sortable th-mono">Attempts <span class="sort-icon"></span></th>
          <th scope="col" data-col="days_in_pipeline" class="sortable th-mono">Days <span class="sort-icon"></span></th>

          <!-- ── Alerts ── -->
          <th scope="col" data-col="alerts"                       >Alerts                                   </th>

          <!-- ── AI ── -->
          <th scope="col" data-col="suggested_action"             >Suggested                                </th>

          <!-- ── Actions ── -->
          <th scope="col" data-col="actions"      class="col-actions">Actions                              </th>
        </tr>
      </thead>

      <!-- Body — rows rendered by Table._renderRow() -->
      <tbody class="table-body" id="table-body">
        <!--
          Example row structure (generated per lead):

          <tr class="table-row [hot] [overdue]" data-id="lead_001">
            <td class="col-check">
              <input type="checkbox" class="row-checkbox" data-id="lead_001" />
            </td>
            <td class="cell-name">Marcus Johnson</td>
            <td class="cell-phone"><a href="tel:+14045550142">+1 (404) 555-0142</a></td>
            <td class="cell-source"><span class="badge source-dfd">Driving for Dollars</span></td>
            <td class="cell-assigned">Eduardo</td>
            <td class="cell-address">1247 Peachtree Blvd NE, Atlanta</td>
            <td class="cell-type"><span class="badge type-sfr">SFR</span></td>
            <td class="cell-condition"><span class="badge condition-distressed">Distressed</span></td>
            <td class="cell-occupancy"><span class="badge occupancy-vacant">Vacant</span></td>
            <td class="cell-price mono">$180,000</td>
            <td class="cell-arv  mono blue">$320,000</td>
            <td class="cell-repairs mono">$45,000</td>
            <td class="cell-mao mono teal">$179,000</td>
            <td class="cell-roi mono green">38.5%</td>
            <td class="cell-profit mono green">$52,000</td>
            <td class="cell-score">
              <div class="score-bar">
                <div class="score-fill score-hot" style="width:87%"></div>
                <span class="score-label">87</span>
              </div>
            </td>
            <td class="cell-motivation mono">9/10</td>
            <td class="cell-urgency"><span class="badge urgency-high">High</span></td>
            <td class="cell-risk"><span class="badge risk-low">Low</span></td>
            <td class="cell-status"><span class="badge status-negotiation">Negotiation</span></td>
            <td class="cell-substatus">Counter Offer Pending</td>
            <td class="cell-lastcontact">Jan 15, 2025</td>
            <td class="cell-followup">Jan 18, 2025</td>
            <td class="cell-attempts mono">7</td>
            <td class="cell-days mono">12d</td>
            <td class="cell-alerts">
              <span class="alert-flag hot-flag" title="Hot Deal">🔥</span>
            </td>
            <td class="cell-suggested">
              <span class="badge action-offer">Send Offer</span>
            </td>
            <td class="cell-actions">
              <div class="row-actions">
                <button class="action-btn" data-action="call"     data-id="lead_001" title="Call">📞</button>
                <button class="action-btn" data-action="sms"      data-id="lead_001" title="SMS">💬</button>
                <button class="action-btn" data-action="email"    data-id="lead_001" title="Email">✉️</button>
                <button class="action-btn" data-action="note"     data-id="lead_001" title="Note">📝</button>
                <button class="action-btn" data-action="task"     data-id="lead_001" title="Task">✅</button>
                <button class="action-btn" data-action="analyzer" data-id="lead_001" title="Analyze">⚡</button>
                <button class="action-btn" data-action="offer"    data-id="lead_001" title="Send Offer">💰</button>
              </div>
            </td>
          </tr>
        -->
      </tbody>

    </table>
  </div><!-- /.table-scroll-wrapper -->

  <!-- ── Pagination ── -->
  <div class="table-pagination" id="table-pagination">
    <div class="pagination-meta">
      <select class="per-page-select" id="per-page-select" aria-label="Rows per page">
        <option value="25">25 / page</option>
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
      </select>
      <span class="pagination-range" id="pagination-range">0–0 of 0</span>
    </div>
    <div class="pagination-controls" id="pagination-controls">
      <!-- Page buttons generated by Table._renderPagination() -->
    </div>
  </div>

</div><!-- /.table-shell -->

<!--
  COLUMN GROUPS (defined in table.js → COLUMNS array):

  Group 1: Lead Info      → name, phone, source, assigned_to
  Group 2: Property       → property_address, property_type, condition, occupancy
  Group 3: Financials     → asking_price, arv, repairs, mao, roi, estimated_profit
  Group 4: Intelligence   → deal_score, motivation_score, urgency_level, risk_level
  Group 5: Pipeline       → status, substatus
  Group 6: Activity       → last_contact, next_followup, attempts, days_in_pipeline
  Group 7: Alerts         → alerts (computed: hot_deal, overdue, no_contact)
  Group 8: AI             → suggested_action
  Group 9: Actions        → call, sms, email, note, task, analyzer, offer

  Default visible: name, phone, source, property_address, property_type,
                   asking_price, arv, mao, deal_score, status, last_contact,
                   next_followup, alerts, suggested_action, actions
-->
