<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Leads — Properties 714</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/app.css?v=7"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/config.js?v=7"></script>
<script src="/js/auth.js?v=7"></script>
</head>
<body style="background:#F8FAFC">
<div class="app-shell">
<aside class="sidebar">
  <div class="sidebar-brand"><div class="sidebar-logo">P7</div><span class="sidebar-brand-name">Properties 714</span></div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-item"><span class="nav-icon">⬡</span>Dashboard</a>
    <a href="/acquisitions/" class="nav-item"><span class="nav-icon">🎯</span>Adquisiciones</a>
    <span class="nav-section-label">Management</span>
    <a href="/leads/" class="nav-item active"><span class="nav-icon">👥</span>Leads</a>
    <a href="/deals/" class="nav-item"><span class="nav-icon">📋</span>Deals</a>
    <a href="/reports/" class="nav-item"><span class="nav-icon">📊</span>Reports</a>
    <a href="/settings/" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
  </nav>
  <div class="sidebar-footer"><div class="sidebar-user" onclick="P714Auth.logout()">
    <div class="user-avatar" id="s-av">--</div>
    <div><div class="user-name" id="s-name">Loading...</div><div class="user-role" id="s-role">—</div></div>
  </div></div>
</aside>
<main class="app-main" style="background:#F8FAFC">
  <div class="top-bar">
    <div class="breadcrumb"><span>Home</span><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">Leads / CRM</span></div>
    <div class="top-bar-actions">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Exportar</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Lead</button>
    </div>
  </div>
  <div class="page-content">
    <div class="page-header"><h1 class="page-title">Leads / CRM</h1><p class="page-subtitle">Todos tus contactos y leads de vendedores</p></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <input class="search-input" id="q" placeholder="🔍 Buscar..." oninput="filt()" style="width:240px"/>
      <select class="search-input" id="fs" onchange="filt()" style="width:160px">
        <option value="">Todos los Estatus</option>
        <option>Nuevo Lead</option><option>Analizando</option><option>Oferta Lista</option>
        <option>Bajo Contrato</option><option>Cerrado</option><option>Descartado</option>
        <option>New Lead</option><option>Analyzing</option><option>Offer Ready</option>
        <option>Under Contract</option><option>Closed</option><option>Pass</option>
      </select>
      <select class="search-input" id="fa" onchange="filt()" style="width:160px"><option value="">Todos los Agentes</option></select>
      <span style="margin-left:auto;font-size:11px;color:var(--text-3)" id="lsync"></span>
    </div>
    <div class="table-wrap">
      <div class="table-hdr"><span class="table-count" id="lcount">Cargando...</span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Contacto</th><th>Fuente</th><th>Propiedad</th><th>Estatus</th><th>Score</th><th>Seguimiento</th><th>Agente</th><th></th></tr></thead>
          <tbody id="tbody"><tr><td colspan="8" style="padding:40px;text-align:center;color:var(--text-3)">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</div>
<div class="modal-backdrop" id="add-modal">
<div class="modal">
  <div class="modal-hdr"><span class="modal-title">👤 Agregar Lead</span><button class="modal-close-btn" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="l-name" placeholder="Nombre"/></div>
      <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="l-phone" placeholder="+1 (404)..."/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="l-email" type="email"/></div>
      <div class="form-group"><label class="form-label">Fuente</label>
        <select class="form-input" id="l-src"><option>Direct Mail</option><option>Driving for Dollars</option><option>Cold Call</option><option>Pre-Foreclosure</option><option>Probate</option><option>Facebook Ads</option><option>Referral</option><option>Other</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Dirección *</label><input class="form-input" id="l-addr" placeholder="123 Main St, Atlanta, GA"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Precio $</label><input class="form-input" id="l-ask" type="number"/></div>
      <div class="form-group"><label class="form-label">ARV $</label><input class="form-input" id="l-arv" type="number"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-input" id="l-dtype"><option value="fix_flip">Fix &amp; Flip</option><option value="buy_hold">Buy &amp; Hold</option><option value="wholesale">Wholesale</option></select></div>
      <div class="form-group"><label class="form-label">Seguimiento</label><input class="form-input" id="l-fu" type="date"/></div>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea class="form-input" id="l-notes" rows="3"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveLead()">Guardar Lead</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>
</div>
<div id="toast-container"></div>
<script>
const BADGE_MAP={
  'nuevo lead':'b-new-lead','new lead':'b-new-lead',
  'analizando':'b-analyzing','analyzing':'b-analyzing',
  'oferta lista':'b-offer','offer ready':'b-offer',
  'bajo contrato':'b-under-contract','under contract':'b-under-contract',
  'cerrado':'b-closed','closed':'b-closed',
  'descartado':'b-pass','pass':'b-pass','dead':'b-pass'
};
let _all=[];
(async()=>{
  try{
    const s=await P714Auth.init();
    if(!s){window.location.href='/login/?next=/leads/';return;}
    const p=P714Auth.getProfile();
    document.getElementById('s-av').textContent=(p?.full_name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('s-name').textContent=p?.full_name||'User';
    document.getElementById('s-role').textContent=p?.role==='owner'?'Owner':'Agente';
    await loadLeads();
  }catch(e){console.error(e);}
})();
async function loadLeads(){
  try{
    const{data,error}=await P714Auth.getClient().from('acquisitions_leads').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    _all=data||[];
    const agents=[...new Set(_all.map(l=>l.assigned_to).filter(Boolean))];
    document.getElementById('fa').innerHTML='<option value="">Todos los Agentes</option>'+agents.map(a=>`<option>${a}</option>`).join('');
    render(_all);
    document.getElementById('lsync').textContent='Actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="8" style="padding:30px;text-align:center;color:var(--red)">${e.message}</td></tr>`;
  }
}
function render(list){
  document.getElementById('lcount').textContent=`Mostrando ${list.length} de ${_all.length} leads`;
  if(!list.length){document.getElementById('tbody').innerHTML='<tr><td colspan="8" style="padding:40px;text-align:center;color:var(--text-3)">No hay leads</td></tr>';return;}
  document.getElementById('tbody').innerHTML=list.map(l=>{
    const fu=l.next_followup?new Date(l.next_followup).toLocaleDateString('es-MX',{month:'short',day:'numeric'}):'\u2014';
    const ov=l.next_followup&&new Date(l.next_followup)<new Date();
    const sc=l.deal_score||0;
    const init=(l.assigned_to||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const st=(l.status||'nuevo lead').toLowerCase();
    const bc=BADGE_MAP[st]||'b-analyzing';
    return `<tr style="cursor:pointer" onclick="location.href='/deals/?id=${l.id}'">
      <td><div style="font-weight:600;font-size:13px">${esc(l.name||'\u2014')}</div><div style="font-size:11px;color:var(--text-3)">${l.phone||l.email||'Sin contacto'}</div></td>
      <td style="font-size:12px;color:var(--text-2)">${esc(l.source||'\u2014')}</td>
      <td><div style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.property_address||'\u2014')}</div><div style="font-size:11px;color:var(--text-3)">${l.city||''} ${l.state||''}</div></td>
      <td><span class="badge ${bc}"><span class="badge-dot"></span>${l.status||'\u2014'}</span></td>
      <td><span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:${sc>=70?'var(--green)':sc>=50?'var(--amber)':'var(--text-3)'}">${sc||'\u2014'}</span></td>
      <td><span style="font-size:12px;color:${ov?'var(--red)':'var(--text-2)'}">${ov?'\u26a0 ':''}${fu}</span></td>
      <td><div style="display:flex;align-items:center;gap:7px"><div class="user-avatar sm">${init}</div><span style="font-size:12px;color:var(--text-2)">${esc(l.assigned_to||'\u2014')}</span></div></td>
      <td onclick="event.stopPropagation()">
        ${l.phone?`<a href="tel:${l.phone}" style="display:inline-flex;width:28px;height:28px;border-radius:6px;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--border);font-size:13px;text-decoration:none">📞</a>`:''}
      </td>
    </tr>`;
  }).join('');
}
function filt(){
  const q=document.getElementById('q').value.toLowerCase();
  const st=document.getElementById('fs').value;
  const ag=document.getElementById('fa').value;
  render(_all.filter(l=>{
    const txt=`${l.name||''} ${l.phone||''} ${l.property_address||''} ${l.email||''}`.toLowerCase();
    return(!q||txt.includes(q))&&(!st||l.status===st)&&(!ag||l.assigned_to===ag);
  }));
}
function openAdd(){document.getElementById('add-modal').classList.add('open');document.getElementById('l-fu').valueAsDate=new Date(Date.now()+3*86400000);}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}
async function saveLead(){
  const name=document.getElementById('l-name').value.trim();
  const addr=document.getElementById('l-addr').value.trim();
  if(!name||!addr){toast('error','Campos requeridos','Nombre y dirección son obligatorios');return;}
  try{
    const u=P714Auth.getUser(),p=P714Auth.getProfile();
    const arv=parseFloat(document.getElementById('l-arv').value)||0;
    const ask=parseFloat(document.getElementById('l-ask').value)||0;
    const{error}=await P714Auth.getClient().from('acquisitions_leads').insert({
      user_id:u.id,assigned_to:p?.full_name||'Agente',name,
      phone:document.getElementById('l-phone').value||null,
      email:document.getElementById('l-email').value||null,
      source:document.getElementById('l-src').value,
      property_address:addr,deal_type:document.getElementById('l-dtype').value,
      asking_price:ask,arv,mao:arv*0.7,estimated_profit:arv*0.7-ask>0?arv*0.7-ask:null,
      status:'Nuevo Lead',next_followup:document.getElementById('l-fu').value||null,state:'GA'
    });
    if(error)throw error;
    closeModal();
    toast('success','Lead agregado',name+' en el pipeline');
    await loadLeads();
  }catch(e){toast('error','Error',e.message);}
}
function exportCSV(){
  const cols=['name','phone','email','source','property_address','city','status','deal_score','assigned_to','arv','asking_price','mao','estimated_profit'];
  const h=['Nombre','Teléfono','Email','Fuente','Dirección','Ciudad','Estatus','Score','Agente','ARV','Precio','MAO','Ganancia'];
  const rows=[h.join(','),..._all.map(l=>cols.map(c=>`"${(l[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));a.download='leads_p714.csv';a.click();
}
function toast(l,t,m){
  const c=document.getElementById('toast-container'),col={success:'var(--green)',error:'var(--red)',info:'var(--blue)'},ic={success:'\u2713',error:'\u2715',info:'\u2139'};
  const el=document.createElement('div');el.className='toast';
  el.innerHTML=`<span class="toast-icon" style="color:${col[l]}">${ic[l]}</span><div><div class="toast-title">${t}</div>${m?`<div class="toast-msg">${m}</div>`:''}</div>`;
  c.appendChild(el);setTimeout(()=>{el.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>el.remove(),300);},4500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body></html>
