<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Settings — Properties 714</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/config.js?v=13"></script>
<script src="/js/admin-config.js?v=13"></script>
<script src="/js/auth.js?v=13"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F8FAFC;color:#0F172A;font-family:'Inter',-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;height:100%;}
.app-shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:230px;flex-shrink:0;background:#1E293B;display:flex;flex-direction:column;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sb-logo{width:34px;height:34px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}
.sb-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff;}
.sb-nav{flex:1;padding:10px 8px;}
.nav-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#475569;padding:14px 10px 5px;display:block;}
.nav-a{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:#94A3B8;cursor:pointer;transition:all .12s;position:relative;text-decoration:none;}
.nav-a:hover{background:rgba(255,255,255,.06);color:#E2E8F0;}
.nav-a.on{background:rgba(37,99,235,.22);color:#93C5FD;font-weight:600;}
.nav-a.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:#2563EB;border-radius:0 3px 3px 0;}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px;border-radius:8px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.av{width:32px;height:32px;border-radius:50%;background:rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#93C5FD;flex-shrink:0;}
.app-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.top-bar{height:54px;display:flex;align-items:center;padding:0 22px;border-bottom:1px solid #E2E8F0;background:#fff;gap:12px;flex-shrink:0;}
.hbg{display:none;width:36px;height:36px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:5px;flex-shrink:0;}
.hbg span{display:block;width:18px;height:2px;background:#475569;border-radius:2px;}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;}
.sb-ov.open{display:block;}
.pc{flex:1;overflow-y:auto;padding:28px;background:#F8FAFC;}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#0F172A;margin-bottom:4px;}
.page-sub{font-size:12px;color:#94A3B8;margin-bottom:28px;}
.settings-layout{display:grid;grid-template-columns:200px 1fr;gap:22px;}
.settings-nav{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:8px;height:fit-content;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.sn-item{padding:9px 13px;border-radius:8px;font-size:13px;font-weight:500;color:#475569;cursor:pointer;transition:all .12s;}
.sn-item:hover{background:#F8FAFC;color:#0F172A;}
.sn-item.active{background:#EFF6FF;color:#2563EB;font-weight:600;}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.card-h{padding:16px 20px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;}
.card-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#0F172A;}
.card-b{padding:20px;}
/* Status cards */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.sc{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:16px 18px;}
.sc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94A3B8;margin-bottom:8px;}
.sc-val{font-size:14px;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:6px;}
.sc-val.ok{color:#16A34A;}
.sc-val.info{color:#2563EB;}
.sc-sub{font-size:11px;color:#94A3B8;margin-top:3px;}
/* DB columns pill */
.col-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.col-pill{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:600;background:#F0FDF4;color:#16A34A;border:1px solid rgba(22,163,74,.2);font-family:'DM Mono',monospace;}
/* Team */
.team-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #E2E8F0;}
.team-row:last-child{border-bottom:none;}
.team-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap;font-family:'Inter',sans-serif;}
.btn-blue{background:#2563EB;color:#fff;border-color:#2563EB;}
.btn-blue:hover{background:#1D4ED8;}
.btn-ghost{background:transparent;color:#475569;border-color:#E2E8F0;}
.btn-ghost:hover{background:#F8FAFC;}
.btn-danger{background:#FEF2F2;color:#DC2626;border-color:rgba(220,38,38,.15);}
.btn-sm{padding:5px 12px;font-size:11px;}
.fi{width:100%;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:8px;padding:9px 12px;color:#0F172A;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .14s;}
.fi:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.08);background:#fff;}
.fi::placeholder{color:#94A3B8;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:5px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;text-transform:uppercase;}
.b-owner{background:#EFF6FF;color:#2563EB;}
.b-agent{background:#F5F3FF;color:#7C3AED;}
/* Profile */
.av-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin-bottom:16px;}
#tc{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:12px 16px;min-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.tt{font-size:12px;font-weight:600;color:#0F172A;}
.tm{font-size:11px;color:#475569;margin-top:2px;}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .3s;width:260px;}
  .sidebar.open{transform:translateX(0);}
  .hbg{display:flex!important;}
  .settings-layout{grid-template-columns:1fr;}
  .status-grid{grid-template-columns:1fr;}
  .pc{padding:14px;}
}
</style>
</head>
<body>
<div class="sb-ov" id="sb-ov" onclick="closeSB()"></div>
<div class="app-shell">
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-logo">P7</div><span class="sb-name">Properties 714</span></div>
  <nav class="sb-nav">
    <a href="/" class="nav-a"><span style="width:16px;text-align:center">⬡</span>Dashboard</a>
    <a href="/acquisitions/" class="nav-a"><span style="width:16px;text-align:center">🎯</span>Adquisiciones</a>
    <span class="nav-lbl">Management</span>
    <a href="/leads/" class="nav-a"><span style="width:16px;text-align:center">👥</span>Leads</a>
    <a href="/deals/" class="nav-a"><span style="width:16px;text-align:center">📋</span>Deals</a>
    <a href="/reports/" class="nav-a"><span style="width:16px;text-align:center">📊</span>Reports</a>
    <a href="/settings/" class="nav-a on"><span style="width:16px;text-align:center">⚙️</span>Settings</a>
  </nav>
  <div class="sb-foot"><div class="sb-user" onclick="P714Auth.logout()">
    <div class="av" id="s-av">--</div>
    <div><div style="font-size:12px;font-weight:600;color:#E2E8F0" id="s-name">...</div><div style="font-size:10px;color:#475569" id="s-role">—</div></div>
  </div></div>
</aside>
<main class="app-main">
  <div class="top-bar">
    <button class="hbg" onclick="toggleSB()"><span></span><span></span><span></span></button>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8">
      <span>Home</span><span style="color:#CBD5E1;margin:0 4px">/</span><span style="color:#0F172A;font-weight:600">Settings</span>
    </div>
  </div>
  <div class="pc">
    <div class="page-title">Settings</div>
    <div class="page-sub">Configuración del sistema y gestión del equipo</div>
    <div class="settings-layout">
      <!-- Nav -->
      <div class="settings-nav">
        <div class="sn-item active" onclick="showTab('equipo',this)">👥 Equipo</div>
        <div class="sn-item" onclick="showTab('perfil',this)">👤 Mi Perfil</div>
        <div class="sn-item" onclick="showTab('sistema',this)">⚙️ Sistema</div>
      </div>
      <!-- Content -->
      <div id="tab-content"></div>
    </div>
  </div>
</main>
</div>
<div id="tc"></div>
<script>
let _profile=null,_isOwner=false,_team=[],_adminSb=null;
function toggleSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-ov').classList.toggle('open');}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('open');}

// Admin client bypasses RLS — required to read ALL profiles
function getAdminClient(){
  if(_adminSb)return _adminSb;
  const svcKey=(window.__P714_ADMIN_CONFIG__||{}).serviceRoleKey;
  if(!svcKey)return P714Auth.getClient(); // fallback
  _adminSb=supabase.createClient(window.__P714_CONFIG__.supabaseUrl,svcKey);
  return _adminSb;
}

async function loadTeam(){
  try{
    const{data,error}=await getAdminClient().from('profiles').select('*').order('created_at');
    if(error)throw error;
    _team=data||[];
  }catch(e){
    // fallback to own client
    const{data}=await P714Auth.getClient().from('profiles').select('*').order('created_at');
    _team=data||[];
  }
}

(async()=>{
  try{
    const s=await P714Auth.init();
    if(!s){location.href='/login/?next=/settings/';return;}
    _profile=P714Auth.getProfile();
    _isOwner=P714Auth.isOwner();
    document.getElementById('s-av').textContent=(_profile?.full_name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('s-name').textContent=_profile?.full_name||'User';
    document.getElementById('s-role').textContent=_isOwner?'Owner':'Agente';
    await loadTeam();
    showTab('equipo',document.querySelector('.sn-item'));
  }catch(e){console.error(e);}
})();

function showTab(tab,el){
  document.querySelectorAll('.sn-item').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  const c=document.getElementById('tab-content');
  if(tab==='equipo')renderEquipo(c);
  else if(tab==='perfil')renderPerfil(c);
  else if(tab==='sistema')renderSistema(c);
}

const avColors=['rgba(37,99,235,.2)','rgba(13,148,136,.2)','rgba(22,163,74,.2)','rgba(124,58,237,.2)','rgba(217,119,6,.2)'];
const avTc=['#2563EB','#0D9488','#16A34A','#7C3AED','#D97706'];

function renderEquipo(c){
  c.innerHTML=`
  <div class="card" style="margin-bottom:16px">
    <div class="card-h">
      <span class="card-t">👥 Equipo — ${_team.length} miembro${_team.length!==1?'s':''}</span>
      ${_isOwner?`<button class="btn btn-blue btn-sm" onclick="showAddAgent()">+ Agregar Agente</button>`:''}
    </div>
    <div>
    ${_team.map((m,i)=>{
      const init=(m.full_name||m.email||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const roleLabel=m.role==='owner'?'Owner/Admin':m.role==='acquisitionist'?'Adquisicionista':'Agente';
      const roleBadge=m.role==='owner'?'b-owner':'b-agent';
      const isSelf=m.id===_profile?.id;
      return `<div class="team-row">
        <div class="team-av" style="background:${avColors[i%5]};color:${avTc[i%5]}">${init}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#0F172A">${esc(m.full_name||'—')}${isSelf?' <span style="font-size:10px;color:#94A3B8">(tú)</span>':''}</div>
          <div style="font-size:11px;color:#94A3B8;margin-top:1px">${esc(m.email||'')}</div>
        </div>
        <span class="badge ${roleBadge}">${roleLabel}</span>
        ${_isOwner&&!isSelf?`
          <button class="btn btn-ghost btn-sm" onclick="toggleRole('${m.id}','${m.role}')" title="Cambiar rol" style="font-size:11px">⇄ Rol</button>
          <button class="btn btn-ghost btn-sm" onclick="resetPwd('${m.email}')" title="Resetear contraseña">🔑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAgent('${m.id}','${esc(m.full_name||m.email||'')}')">Eliminar</button>
        `:''}
      </div>`;
    }).join('')}
    </div>
  </div>
  <div class="card" id="add-agent-card" style="display:none">
    <div class="card-h"><span class="card-t">➕ Agregar Nuevo Miembro</span></div>
    <div class="card-b">
      <div class="fg"><label class="fl">Nombre Completo</label><input class="fi" id="ag-name" placeholder="Juan Rodríguez"/></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="ag-email" type="email" placeholder="juan@properties714.com"/></div>
      <div class="fg"><label class="fl">Contraseña Temporal</label><input class="fi" id="ag-pass" type="password" placeholder="Mínimo 8 caracteres"/></div>
      <div class="fg"><label class="fl">Rol</label>
        <select class="fi" id="ag-role">
          <option value="acquisitionist">Adquisicionista</option>
          <option value="owner">Owner / Admin</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-blue" onclick="createAgent()">✓ Crear Cuenta</button>
        <button class="btn btn-ghost" onclick="document.getElementById('add-agent-card').style.display='none'">Cancelar</button>
      </div>
    </div>
  </div>`;
}

function showAddAgent(){
  document.getElementById('add-agent-card').style.display='block';
  document.getElementById('add-agent-card').scrollIntoView({behavior:'smooth'});
}

async function createAgent(){
  const name=document.getElementById('ag-name').value.trim();
  const email=document.getElementById('ag-email').value.trim();
  const pass=document.getElementById('ag-pass').value;
  const role=document.getElementById('ag-role').value||'acquisitionist';
  if(!name||!email){toast('error','Campos incompletos','Llena nombre y email');return;}
  if(!pass||pass.length<8){toast('error','Contraseña muy corta','Mínimo 8 caracteres');return;}
  try{
    const svcKey=(window.__P714_ADMIN_CONFIG__||{}).serviceRoleKey;
    if(!svcKey){toast('error','Sin permisos de admin','Falta service role key');return;}
    const adminSb=supabase.createClient(window.__P714_CONFIG__.supabaseUrl,svcKey);
    const{data,error}=await adminSb.auth.admin.createUser({email,password:pass,email_confirm:true,user_metadata:{full_name:name}});
    if(error)throw error;
    await adminSb.from('profiles').upsert({id:data.user.id,full_name:name,email,role});
    const roleLabel=role==='owner'?'Owner/Admin':'Adquisicionista';
    toast('success',`✓ ${roleLabel} creado`,`${name} puede iniciar sesión ahora`);
    document.getElementById('ag-name').value='';document.getElementById('ag-email').value='';document.getElementById('ag-pass').value='';
    document.getElementById('add-agent-card').style.display='none';
    await loadTeam();renderEquipo(document.getElementById('tab-content'));
  }catch(e){toast('error','Error al crear cuenta',e.message);}
}

async function toggleRole(id,currentRole){
  const newRole=currentRole==='owner'?'acquisitionist':'owner';
  const label=newRole==='owner'?'Owner/Admin':'Adquisicionista';
  if(!confirm(`¿Cambiar rol a ${label}?`))return;
  try{
    const svcKey=(window.__P714_ADMIN_CONFIG__||{}).serviceRoleKey;
    if(!svcKey){toast('error','Sin permisos','Falta service role key');return;}
    const adminSb=supabase.createClient(window.__P714_CONFIG__.supabaseUrl,svcKey);
    const{error}=await adminSb.from('profiles').update({role:newRole}).eq('id',id);
    if(error)throw error;
    toast('success','✓ Rol actualizado',`Ahora es ${label}`);
    await loadTeam();renderEquipo(document.getElementById('tab-content'));
  }catch(e){toast('error','Error',e.message);}
}

async function resetPwd(email){
  try{
    const{error}=await P714Auth.getClient().auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/login/'});
    if(error)throw error;
    toast('success','Email enviado',`Instrucciones de reset enviadas a ${email}`);
  }catch(e){toast('error','Error',e.message);}
}

async function deleteAgent(id,name){
  if(!confirm(`¿Eliminar a ${name}? Esta acción no se puede deshacer.`))return;
  try{
    const{error}=await getAdminClient().from('profiles').delete().eq('id',id);
    if(error)throw error;
    toast('success','Miembro eliminado','');
    await loadTeam();renderEquipo(document.getElementById('tab-content'));
  }catch(e){toast('error','Error',e.message);}
}

function renderPerfil(c){
  const p=_profile;
  const init=(p?.full_name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  c.innerHTML=`
  <div class="card">
    <div class="card-h"><span class="card-t">👤 Mi Perfil</span></div>
    <div class="card-b">
      <div class="av-lg" style="background:rgba(37,99,235,.15);color:#2563EB">${init}</div>
      <div class="fg"><label class="fl">Nombre Completo</label>
        <input class="fi" id="pf-name" value="${esc(p?.full_name||'')}"/></div>
      <div class="fg"><label class="fl">Email</label>
        <input class="fi" value="${esc(p?.email||'')}" disabled style="opacity:.6;cursor:not-allowed"/></div>
      <div class="fg"><label class="fl">Rol</label>
        <input class="fi" value="${p?.role==='owner'?'Owner':'Agente'}" disabled style="opacity:.6;cursor:not-allowed"/></div>
      <button class="btn btn-blue" onclick="saveProfile()">Guardar Cambios</button>
      <div style="margin-top:24px;padding-top:24px;border-top:1px solid #E2E8F0">
        <div style="font-size:13px;font-weight:600;color:#0F172A;margin-bottom:4px">Cambiar Contraseña</div>
        <div style="font-size:12px;color:#64748B;margin-bottom:12px">Recibió un email con instrucciones</div>
        <button class="btn btn-ghost btn-sm" onclick="sendReset()">📧 Enviar Email de Reset</button>
      </div>
    </div>
  </div>`;
}

async function saveProfile(){
  const name=document.getElementById('pf-name').value.trim();
  if(!name){toast('error','Nombre requerido','');return;}
  const{error}=await P714Auth.getClient().from('profiles').update({full_name:name}).eq('id',_profile.id);
  if(!error)toast('success','✓ Guardado','Perfil actualizado');
  else toast('error','Error',error.message);
}

async function sendReset(){
  const{error}=await P714Auth.getClient().auth.resetPasswordForEmail(_profile?.email,{redirectTo:location.origin+'/login/'});
  if(!error)toast('success','Email enviado','Revisa tu bandeja de entrada');
  else toast('error','Error',error.message);
}

function renderSistema(c){
  const hasAI=!!(window.__P714_CONFIG__?.anthropicKey);
  const cols=['listing_url','beds','baths','zip','comp1_address','comp2_address','comp3_address','owner_name','user_id','deal_type','notes','initial_offer','assigned_to','status','source'];
  c.innerHTML=`
  <div class="card">
    <div class="card-h"><span class="card-t">⚙️ Sistema</span></div>
    <div class="card-b">
      <div class="status-grid">
        <div class="sc">
          <div class="sc-label">Base de Datos</div>
          <div class="sc-val ok">✓ Supabase</div>
          <div class="sc-sub">PostgreSQL Cloud — Conectado</div>
        </div>
        <div class="sc">
          <div class="sc-label">Versión</div>
          <div class="sc-val">v4.0</div>
          <div class="sc-sub">AI Acquisition System</div>
        </div>
        <div class="sc">
          <div class="sc-label">IA / Claude</div>
          <div class="sc-val ${hasAI?'ok':''}" style="${hasAI?'':'color:#D97706'}">${hasAI?'✓ Activa':'⚠ Sin API Key'}</div>
          <div class="sc-sub">${hasAI?'Deal Analyzer activo':'Agrega key en js/config.js'}</div>
        </div>
        <div class="sc">
          <div class="sc-label">Deploy</div>
          <div class="sc-val info">EasyPanel</div>
          <div class="sc-sub">Docker / nginx</div>
        </div>
      </div>
      <!-- DB Columns check -->
      <div style="margin-top:4px">
        <div style="font-size:12px;font-weight:700;color:#0F172A;margin-bottom:8px">✅ Todas las migraciones aplicadas</div>
        <div style="font-size:12px;color:#64748B;margin-bottom:10px">La base de datos tiene todos los campos necesarios. No se requiere ninguna acción SQL.</div>
        <div class="col-grid">
          ${cols.map(col=>`<span class="col-pill">${col}</span>`).join('')}
        </div>
      </div>
      <!-- Info -->
      <div style="margin-top:20px;padding:14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px">
        <div style="font-size:12px;font-weight:700;color:#15803D;margin-bottom:4px">✓ Sistema listo para operar</div>
        <div style="font-size:11px;color:#166534">Supabase conectado · RLS activo · 50 columnas disponibles · Auth funcionando</div>
      </div>
    </div>
  </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(l,t,m){
  const c=document.getElementById('tc');
  const col={success:'#16A34A',error:'#DC2626',info:'#2563EB'};
  const el=document.createElement('div');el.className='toast';
  el.innerHTML=`<span style="color:${col[l]};font-size:15px">${l==='success'?'✓':'✕'}</span><div><div class="tt">${t}</div>${m?`<div class="tm">${m}</div>`:''}</div>`;
  c.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},5000);
}
</script>
