<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mensajes — Properties 714</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/config.js?v=12"></script>
<script src="/js/auth.js?v=12"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F8FAFC;color:#0F172A;font-family:'Inter',-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;height:100%;}
.app-shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:230px;flex-shrink:0;background:#1E293B;display:flex;flex-direction:column;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sb-logo{width:34px;height:34px;background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}
.sb-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff;}
.sb-nav{flex:1;padding:10px 8px;}
.nav-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#475569;padding:14px 10px 5px;display:block;}
.nav-a{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:#94A3B8;cursor:pointer;transition:all .12s;position:relative;text-decoration:none;}
.nav-a:hover{background:rgba(255,255,255,.06);color:#E2E8F0;}
.nav-a.on{background:rgba(37,99,235,.22);color:#93C5FD;font-weight:600;}
.nav-a.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:#2563EB;border-radius:0 3px 3px 0;}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px;border-radius:8px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.av{width:32px;height:32px;border-radius:50%;background:rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#93C5FD;flex-shrink:0;}
.app-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.top-bar{height:54px;display:flex;align-items:center;padding:0 22px;border-bottom:1px solid #E2E8F0;background:#fff;gap:12px;flex-shrink:0;}
.hbg{display:none;width:36px;height:36px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:5px;flex-shrink:0;}
.hbg span{display:block;width:18px;height:2px;background:#475569;border-radius:2px;}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;}
.sb-ov.open{display:block;}
/* Messages layout */
.msg-shell{flex:1;display:flex;overflow:hidden;}
/* Left list */
.msg-list-panel{width:300px;flex-shrink:0;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden;}
.ml-top{padding:14px 16px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ml-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#0F172A;flex:1;}
.folder-tabs{display:flex;border-bottom:1px solid #E2E8F0;flex-shrink:0;}
.ftab{flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:600;color:#94A3B8;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;}
.ftab.on{color:#2563EB;border-bottom-color:#2563EB;}
.ml-items{flex:1;overflow-y:auto;}
.ml-item{padding:14px 16px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .1s;position:relative;}
.ml-item:hover{background:#F8FAFC;}
.ml-item.active{background:#EFF6FF;}
.ml-item.unread::before{content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:#2563EB;}
.ml-from{font-size:13px;font-weight:600;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.ml-item.unread .ml-from{color:#2563EB;}
.ml-subj{font-size:12px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.ml-time{font-size:10px;color:#94A3B8;}
.ml-empty{padding:48px 20px;text-align:center;color:#94A3B8;}
/* Right reading pane */
.msg-read-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F8FAFC;}
.mr-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94A3B8;gap:10px;}
.mr-empty-icon{font-size:44px;}
.mr-top{padding:16px 24px;border-bottom:1px solid #E2E8F0;background:#fff;flex-shrink:0;}
.mr-subj{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#0F172A;margin-bottom:8px;}
.mr-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:#64748B;}
.mr-body{flex:1;overflow-y:auto;padding:24px;}
.mr-body-text{font-size:14px;line-height:1.7;color:#334155;white-space:pre-wrap;background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:20px;}
.mr-actions{padding:12px 24px;border-top:1px solid #E2E8F0;background:#fff;display:flex;gap:8px;flex-shrink:0;}
/* Compose panel */
.compose-panel{position:fixed;bottom:0;right:24px;width:520px;max-width:96vw;background:#fff;border:1px solid #E2E8F0;border-radius:14px 14px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.12);z-index:500;display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform .25s ease;}
.compose-panel.open{transform:translateY(0);}
.cp-hdr{background:#1E293B;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.cp-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;}
.cp-close{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cp-field{display:flex;align-items:center;border-bottom:1px solid #E2E8F0;}
.cp-lbl{width:70px;font-size:11px;font-weight:600;text-transform:uppercase;color:#94A3B8;padding:0 16px;flex-shrink:0;}
.cp-inp{flex:1;padding:11px 12px 11px 0;font-size:13px;font-family:'Inter',sans-serif;color:#0F172A;border:none;outline:none;background:transparent;}
.cp-body{flex:1;padding:14px 16px;font-size:13px;font-family:'Inter',sans-serif;color:#0F172A;border:none;outline:none;resize:none;min-height:140px;}
.cp-footer{padding:12px 16px;border-top:1px solid #E2E8F0;display:flex;gap:8px;align-items:center;}
/* Btn */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap;font-family:'Inter',sans-serif;}
.btn-blue{background:#2563EB;color:#fff;border-color:#2563EB;}
.btn-blue:hover{background:#1D4ED8;}
.btn-ghost{background:transparent;color:#475569;border-color:#E2E8F0;}
.btn-ghost:hover{background:#F8FAFC;}
.btn-sm{padding:5px 12px;font-size:11px;}
.btn-danger{background:#FEF2F2;color:#DC2626;border-color:rgba(220,38,38,.15);}
/* SMTP notice */
.smtp-notice{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px 16px;font-size:12px;color:#92400E;margin-bottom:14px;line-height:1.5;}
/* Toast */
#tc{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:12px 16px;min-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.tt{font-size:12px;font-weight:600;color:#0F172A;}
.tm{font-size:11px;color:#475569;margin-top:2px;}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .3s;width:260px;}
  .sidebar.open{transform:translateX(0);}
  .hbg{display:flex!important;}
  .msg-list-panel{width:100%;border-right:none;}
  .msg-read-panel{display:none;}
  .msg-read-panel.mobile-show{display:flex;position:fixed;inset:0;z-index:50;background:#F8FAFC;}
  .compose-panel{right:0;width:100%;border-radius:0;}
}
</style>
</head>
<body>
<div class="sb-ov" id="sb-ov" onclick="closeSB()"></div>
<div class="app-shell">
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-logo">P7</div><span class="sb-name">Properties 714</span></div>
  <nav class="sb-nav">
    <a href="/" class="nav-a">⬡ Dashboard</a>
    <a href="/acquisitions/" class="nav-a">🎯 Adquisiciones</a>
    <span class="nav-lbl">Management</span>
    <a href="/leads/" class="nav-a">👥 Leads</a>
    <a href="/deals/" class="nav-a">📋 Deals</a>
    <a href="/reports/" class="nav-a">📊 Reports</a>
    <a href="/messages/" class="nav-a on">📨 Mensajes</a>
    <a href="/settings/" class="nav-a">⚙️ Settings</a>
  </nav>
  <div class="sb-foot"><div class="sb-user" onclick="P714Auth.logout()">
    <div class="av" id="s-av">--</div>
    <div><div style="font-size:12px;font-weight:600;color:#E2E8F0" id="s-name">...</div><div style="font-size:10px;color:#475569" id="s-role">—</div></div>
  </div></div>
</aside>
<main class="app-main">
  <div class="top-bar">
    <button class="hbg" onclick="toggleSB()"><span></span><span></span><span></span></button>
    <div style="font-size:12px;color:#94A3B8">
      <span>Home</span><span style="color:#CBD5E1;margin:0 4px">/</span><span style="color:#0F172A;font-weight:600">Mensajes</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-blue btn-sm" onclick="openCompose()">+ Nuevo Mensaje</button>
    </div>
  </div>
  <div class="msg-shell">
    <!-- Left: message list -->
    <div class="msg-list-panel">
      <div class="ml-top">
        <span class="ml-title">📨 Mensajes</span>
        <span id="unread-badge" style="background:#EFF6FF;color:#2563EB;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;display:none">0</span>
      </div>
      <div class="folder-tabs">
        <div class="ftab on" onclick="loadFolder('inbox',this)" id="tab-inbox">Recibidos</div>
        <div class="ftab" onclick="loadFolder('sent',this)" id="tab-sent">Enviados</div>
        <div class="ftab" onclick="loadFolder('all',this)">Todos</div>
      </div>
      <div class="ml-items" id="ml-items">
        <div class="ml-empty">📨<br>Cargando...</div>
      </div>
    </div>
    <!-- Right: reading pane -->
    <div class="msg-read-panel" id="msg-read-panel">
      <div class="mr-empty" id="mr-empty">
        <div class="mr-empty-icon">📧</div>
        <div style="font-size:14px;font-weight:600;color:#475569">Selecciona un mensaje</div>
        <div style="font-size:12px">O crea uno nuevo con &ldquo;+ Nuevo Mensaje&rdquo;</div>
      </div>
      <div id="mr-content" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;"></div>
    </div>
  </div>
</main>
</div>

<!-- Compose -->
<div class="compose-panel" id="compose-panel">
  <div class="cp-hdr" onclick="toggleCompose()">
    <span class="cp-title">✉️ Nuevo Mensaje</span>
    <button class="cp-close" onclick="event.stopPropagation();closeCompose()">×</button>
  </div>
  <div class="cp-field">
    <span class="cp-lbl">Para</span>
    <input class="cp-inp" id="cp-to" type="email" placeholder="destinatario@email.com"/>
  </div>
  <div class="cp-field">
    <span class="cp-lbl">Asunto</span>
    <input class="cp-inp" id="cp-sub" placeholder="Asunto del mensaje"/>
  </div>
  <textarea class="cp-body" id="cp-body" placeholder="Escribe tu mensaje..."></textarea>
  <div class="cp-footer">
    <button class="btn btn-blue" onclick="sendMsg()">✉️ Enviar</button>
    <button class="btn btn-ghost" onclick="closeCompose()">Cancelar</button>
    <span style="font-size:11px;color:#94A3B8;margin-left:auto">🔒 Guardado en Supabase</span>
  </div>
</div>

<div id="tc"></div>
<script>
let _profile=null,_msgs=[],_curMsg=null,_folder='inbox';
function toggleSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-ov').classList.toggle('open');}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('open');}

(async()=>{
  try{
    const s=await P714Auth.init();
    if(!s){location.href='/login/?next=/messages/';return;}
    _profile=P714Auth.getProfile();
    document.getElementById('s-av').textContent=(_profile?.full_name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('s-name').textContent=_profile?.full_name||'User';
    document.getElementById('s-role').textContent=P714Auth.isOwner()?'Owner':'Agente';
    await loadFolder('inbox',document.getElementById('tab-inbox'));
  }catch(e){console.error(e);}
})();

async function loadFolder(folder,tabEl){
  _folder=folder;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  if(tabEl)tabEl.classList.add('on');
  document.getElementById('ml-items').innerHTML='<div class="ml-empty">⏳ Cargando...</div>';
  try{
    let q=P714Auth.getClient().from('messages').select('*').order('sent_at',{ascending:false});
    if(folder==='inbox')q=q.eq('folder','inbox');
    else if(folder==='sent')q=q.eq('folder','sent');
    const{data,error}=await q;
    if(error)throw error;
    _msgs=data||[];
    renderList();
    // Unread count
    const unread=_msgs.filter(m=>!m.read&&m.folder==='inbox').length;
    const badge=document.getElementById('unread-badge');
    badge.style.display=unread?'':'none';
    badge.textContent=unread;
  }catch(e){
    document.getElementById('ml-items').innerHTML=`<div class="ml-empty">❌ ${e.message}</div>`;
  }
}

function renderList(){
  const cont=document.getElementById('ml-items');
  if(!_msgs.length){
    cont.innerHTML=`<div class="ml-empty">📧<br><br><strong>${_folder==='inbox'?'Sin mensajes recibidos':'Sin mensajes enviados'}</strong><br><span style="font-size:11px">Los mensajes aparecerán aquí</span></div>`;
    return;
  }
  cont.innerHTML=_msgs.map(m=>{
    const fromName=m.folder==='sent'?(m.to_name||m.to_email||'Destinatario'):(m.from_name||m.from_email||'Desconocido');
    const date=new Date(m.sent_at);
    const today=new Date();
    const dateStr=date.toDateString()===today.toDateString()
      ?date.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})
      :date.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
    return `<div class="ml-item ${m.read?'':'unread'} ${_curMsg?.id===m.id?'active':''}" onclick="openMsg('${m.id}')">
      <div class="ml-from">${esc(fromName)}</div>
      <div class="ml-subj">${esc(m.subject||'Sin asunto')}</div>
      <div class="ml-time">${dateStr}</div>
    </div>`;
  }).join('');
}

function openMsg(id){
  _curMsg=_msgs.find(m=>m.id===id);
  if(!_curMsg)return;
  renderList(); // re-render to show active
  // Mark as read
  if(!_curMsg.read){
    P714Auth.getClient().from('messages').update({read:true}).eq('id',id).then(()=>{
      _curMsg.read=true;renderList();
    });
  }
  const fromName=_curMsg.folder==='sent'?(_curMsg.to_name||_curMsg.to_email||'Destinatario'):(_curMsg.from_name||_curMsg.from_email||'Remitente');
  const dateStr=new Date(_curMsg.sent_at).toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('mr-empty').style.display='none';
  const mc=document.getElementById('mr-content');
  mc.style.display='flex';mc.style.flexDirection='column';mc.style.overflow='hidden';mc.style.flex='1';
  mc.innerHTML=`
    <div class="mr-top">
      <div class="mr-subj">${esc(_curMsg.subject||'Sin asunto')}</div>
      <div class="mr-meta">
        <span>${_curMsg.folder==='sent'?'↗️ Para:':'↓ De:'} <strong>${esc(fromName)}</strong></span>
        <span>•</span>
        <span>${dateStr}</span>
      </div>
    </div>
    <div class="mr-body"><div class="mr-body-text">${esc(_curMsg.body||'(Sin contenido)')}</div></div>
    <div class="mr-actions">
      <button class="btn btn-ghost btn-sm" onclick="replyTo('${esc(_curMsg.from_email||'')}','${esc(_curMsg.subject||'')}')">↩ Responder</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMsg('${id}')">Eliminar</button>
    </div>`;
}

function replyTo(email,subject){
  document.getElementById('cp-to').value=email;
  document.getElementById('cp-sub').value=subject.startsWith('Re:')?subject:'Re: '+subject;
  document.getElementById('cp-body').value='';
  openCompose();
}

async function deleteMsg(id){
  if(!confirm('¿Eliminar este mensaje?'))return;
  const{error}=await P714Auth.getClient().from('messages').delete().eq('id',id);
  if(!error){
    document.getElementById('mr-empty').style.display='flex';
    document.getElementById('mr-content').style.display='none';
    _curMsg=null;
    toast('success','Eliminado','');
    await loadFolder(_folder,null);
  }
}

async function sendMsg(){
  const to=document.getElementById('cp-to').value.trim();
  const sub=document.getElementById('cp-sub').value.trim();
  const body=document.getElementById('cp-body').value.trim();
  if(!to||!body){toast('error','Faltan campos','Llena Para y el mensaje');return;}
  try{
    const{error}=await P714Auth.getClient().from('messages').insert({
      from_user_id:P714Auth.getUser().id,
      from_name:_profile?.full_name||'Properties 714',
      from_email:_profile?.email||'team@properties714.com',
      to_email:to,
      to_name:'',
      subject:sub||'(Sin asunto)',
      body,
      folder:'sent',
      read:true
    });
    if(error)throw error;
    toast('success','✓ Mensaje guardado','Guardado en Enviados. Para envío externo real, configura SMTP.');
    closeCompose();
    document.getElementById('cp-to').value='';
    document.getElementById('cp-sub').value='';
    document.getElementById('cp-body').value='';
    await loadFolder('sent',document.getElementById('tab-sent'));
  }catch(e){toast('error','Error',e.message);}
}

function openCompose(){
  document.getElementById('compose-panel').classList.add('open');
  setTimeout(()=>document.getElementById('cp-to').focus(),280);
}
function closeCompose(){
  document.getElementById('compose-panel').classList.remove('open');
}
function toggleCompose(){
  document.getElementById('compose-panel').classList.toggle('open');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(l,t,m){
  const c=document.getElementById('tc');
  const col={success:'#16A34A',error:'#DC2626',info:'#2563EB'};
  const el=document.createElement('div');el.className='toast';
  el.innerHTML=`<span style="color:${col[l]};font-size:15px">${l==='success'?'✓':'✕'}</span><div><div class="tt">${t}</div>${m?`<div class="tm">${m}</div>`:''}</div>`;
  c.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},5000);
}
</script>
</body></html>
