<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — Properties 714</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F8FAFC;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#F8FAFC 0%,#EFF6FF 50%,#F0FDF4 100%);}
.login-card{width:100%;max-width:420px;background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.login-logo{width:38px;height:38px;background:#2563EB;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;box-shadow:0 2px 8px rgba(37,99,235,0.3);}
.login-brand-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#0F172A;letter-spacing:-0.02em;}
.login-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.03em;color:#0F172A;margin-bottom:6px;}
.login-subtitle{font-size:13px;color:#94A3B8;margin-bottom:28px;}
.form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#475569;margin-bottom:6px;}
.form-input{width:100%;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:8px;padding:10px 14px;font-family:'Inter',sans-serif;font-size:14px;color:#0F172A;outline:none;transition:all 150ms;}
.form-input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,0.1);background:#fff;}
.form-input::placeholder{color:#CBD5E1;}
.form-group{margin-bottom:18px;}
.btn-login{width:100%;background:#2563EB;color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 150ms;margin-top:6px;box-shadow:0 2px 8px rgba(37,99,235,0.3);}
.btn-login:hover{background:#1D4ED8;box-shadow:0 4px 12px rgba(37,99,235,0.4);}
.btn-login:active{transform:scale(0.98);}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.login-error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:11px 14px;font-size:12px;color:#DC2626;margin-top:14px;line-height:1.5;}
.login-error.show{display:block;}
.login-footer{margin-top:28px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:#CBD5E1;}
.divider{height:1px;background:#F1F5F9;margin:20px 0;}
</style>
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">P7</div>
      <span class="login-brand-name">Properties 714</span>
    </div>
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-subtitle">Inicia sesión en tu sistema de adquisiciones</p>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="tu@properties714.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="btn-login">Iniciar Sesión</button>
    <div class="login-error" id="login-error"></div>
    <div class="divider"></div>
    <div class="login-footer">Properties 714 LLC — Sistema Interno</div>
  </div>
</div>
<script>
(async()=>{
  try{
    const session=await P714Auth.init();
    if(session){
      const params=new URLSearchParams(window.location.search);
      window.location.href=params.get('next')||'/';
    }
  }catch(e){console.warn('[Login]',e.message);}
})();

const btnLogin=document.getElementById('btn-login');
const emailEl=document.getElementById('email');
const passEl=document.getElementById('password');
const errorEl=document.getElementById('login-error');

function showError(msg){errorEl.textContent=msg;errorEl.classList.add('show');}
function hideError(){errorEl.classList.remove('show');}

async function handleLogin(){
  hideError();
  const email=emailEl.value.trim();
  const password=passEl.value;
  if(!email||!password){showError('Por favor ingresa tu email y contraseña.');return;}
  btnLogin.disabled=true;
  btnLogin.textContent='Iniciando sesión...';
  try{
    await P714Auth.login(email,password);
    const params=new URLSearchParams(window.location.search);
    window.location.href=params.get('next')||'/';
  }catch(err){
    showError(err.message==='Invalid login credentials'?'Email o contraseña incorrectos.':err.message||'Error al iniciar sesión.');
    btnLogin.disabled=false;
    btnLogin.textContent='Iniciar Sesión';
  }
}

btnLogin.addEventListener('click',handleLogin);
passEl.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
emailEl.addEventListener('keydown',e=>{if(e.key==='Enter')passEl.focus();});
</script>
</body></html>
