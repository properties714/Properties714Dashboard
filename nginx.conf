server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }
    location /acquisitions/ {
        try_files $uri $uri/ /acquisitions/index.html;
    }
    location /deals/ {
        try_files $uri $uri/ /deals/index.html;
    }
    location /leads/ {
        try_files $uri $uri/ /leads/index.html;
    }
    location /reports/ {
        try_files $uri $uri/ /reports/index.html;
    }
    location /messages/ {
        try_files $uri $uri/ /messages/index.html;
    }
    location /settings/ {
        try_files $uri $uri/ /settings/index.html;
    }
    location /login/ {
        try_files $uri $uri/ /login/index.html;
    }
    location /super-admin/ {
        try_files $uri $uri/ /super-admin/index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|json)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
