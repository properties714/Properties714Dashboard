server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inject Donna AI widget into all HTML pages
    sub_filter '</body>' '<script src="/js/donna.js?v=1"></script></body>';
    sub_filter_once on;

    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    location /acquisitions/ {
        try_files $uri $uri/ /acquisitions/index.html;
    }

    location /deals/ {
        try_files $uri $uri/ /deals/index.html;
    }

    location /leads/ {
        try_files $uri $uri/ /leads/index.html;
    }

    location /reports/ {
        try_files $uri $uri/ /reports/index.html;
    }

    location /messages/ {
        try_files $uri $uri/ /messages/index.html;
    }

    location /settings/ {
        try_files $uri $uri/ /settings/index.html;
    }

    location /login/ {
        try_files $uri $uri/ /login/index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
